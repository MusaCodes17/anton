# Anton local-dev / integration-test compose file.
#
# For production: use the host's secret store instead of env_file, and deploy
# with the Caddyfile in deploy/ for TLS termination.
#
# Usage (dev, no replication):
#   ANTON_DATA_DIR=~/anton-data docker compose up --build
#
# Usage (production, with Litestream replication — RA1.4):
#   Set LITESTREAM_BUCKET and the four LITESTREAM_* credentials in .env or
#   the host secret store. entrypoint.sh detects the variable and activates
#   replication automatically; without it the image runs as plain uvicorn.
#
# The database lives at /data/shoe_deals.db inside the container, which maps
# to $ANTON_DATA_DIR on the host (default: ~/anton-data — R2.2 location).
# SQLite must be on a local disk volume; network filesystems cause corruption.
services:
  anton:
    build:
      context: ./backend
    image: anton-backend:latest
    ports:
      # Bind to loopback only on the host — Caddy (or your reverse proxy)
      # forwards from 443 to this port. Never expose 8000 to 0.0.0.0 directly.
      - "127.0.0.1:8000:8000"
    volumes:
      - ${ANTON_DATA_DIR:-${HOME}/anton-data}:/data
    environment:
      - DATABASE_URL=sqlite:////data/shoe_deals.db
      - MCP_SERVER_URL=http://localhost:8000/mcp
      - TZ=America/Toronto
      # LITESTREAM_* are deliberately NOT listed here. Compose's `environment:`
      # overrides `env_file:`, and `${LITESTREAM_BUCKET:-}` would interpolate to
      # an empty string from the shell, silently disabling replication even when
      # the values are set in backend/.env. Let env_file supply them: set them in
      # backend/.env for production, omit them in dev to skip replication.
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
